<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corretor Yuri Imóveis — Encontre o imóvel dos seus sonhos em Osasco e região. Casas, apartamentos, terrenos e imóveis comerciais." />
    <meta name="keywords" content="imóveis osasco, casas osasco, apartamentos osasco, terrenos osasco, imobiliária osasco sp, corretor osasco" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Open Graph base (substituído por react-helmet-async por rota) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Corretor Yuri Imóveis" />
    <meta property="og:locale" content="pt_BR" />

    <title>Corretor Yuri Imóveis — Imóveis em Osasco e Região</title>

    <!-- JSON-LD: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Corretor Yuri Imóveis",
      "description": "Especialista em imóveis em Osasco e região. Casas, apartamentos, terrenos, chalés e imóveis comerciais.",
      "url": "https://yuriimoveis.com.br",
      "telephone": "+55 11 96714-7840",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Osasco",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "areaServed": {
        "@type": "City",
        "name": "Osasco"
      },
      "sameAs": [
        "https://www.instagram.com/yuriimoveiscanela"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
