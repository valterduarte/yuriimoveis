<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corretor Yuri Imóveis — Encontre o imóvel dos seus sonhos em Canela e região. Casas, apartamentos, terrenos e imóveis comerciais." />
    <meta name="keywords" content="imóveis canela, casas canela, apartamentos canela, terrenos canela, imobiliária canela rs, corretor canela" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Open Graph base (substituído por react-helmet-async por rota) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Corretor Yuri Imóveis" />
    <meta property="og:locale" content="pt_BR" />

    <title>Corretor Yuri Imóveis — Imóveis em Canela e Região</title>

    <!-- JSON-LD: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Corretor Yuri Imóveis",
      "description": "Especialista em imóveis em Canela e região. Casas, apartamentos, terrenos, chalés e imóveis comerciais.",
      "url": "https://yuriimoveis.com.br",
      "telephone": "+55 54 99999-9999",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Canela",
        "addressRegion": "RS",
        "addressCountry": "BR"
      },
      "areaServed": {
        "@type": "City",
        "name": "Canela"
      },
      "sameAs": [
        "https://www.instagram.com/yuriimoveiscanela"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
